<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA 5: Personal Blog</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>

<body>

    <header>
        <h1>My Personal Blog</h1>
    </header>

    <form id="postForm">
        <input type="text" id="title" placeholder="Enter post title" />
        <textarea id="content" placeholder="Write your post..." rows="5"></textarea>

        <button type="submit">Submit Post</button>

        <p id="formError" class="error-message"></p>
    </form>

    <section id="postsContainer"></section>

</body>
</html>
